<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://nskircwzcsmbkispshif.supabase.co https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://nskircwzcsmbkispshif.supabase.co; font-src 'self';">
  <title>文章管理 — jieneng</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
  <script src="js/shared.js" defer></script>
  <script src="js/supabase.js" defer></script>
  <script src="js/marked.min.js" defer></script>
  <script src="js/admin.js" defer></script>
</head>
<body>
  <button class="logout" onclick="logout()">登出</button>
  <h1>📝 文章管理</h1>
  <p style="color:var(--dim);margin-bottom:20px;">发布、编辑和管理你的文章</p>

  <div id="loginBox">
    <input type="email" id="email" placeholder="邮箱" style="max-width:400px;">
    <input type="password" id="password" placeholder="密码" style="max-width:400px;">
    <div style="display:flex; gap:10px; max-width:400px;">
      <button onclick="login()">登录</button>
      <button class="cancel" onclick="location.href='index.html'">取消</button>
    </div>
  </div>

  <div id="editor" style="display:none;">
    <h3 id="editorTitle">新建文章</h3>
    <div class="row">
      <input type="text" id="title" placeholder="标题 *">
      <input type="text" id="slug" placeholder="slug (URL标识符，留空自动生成)">
    </div>
    <input type="text" id="tags" placeholder="标签 (逗号分隔)">
    <div class="row">
      <input type="text" id="url" placeholder="外链 URL（可选，如 https://...）">
      <div style="display:flex;gap:6px;flex:1;">
        <input type="text" id="cover" placeholder="封面图 URL（可选）" style="flex:1;">
        <input type="file" id="coverFileInput" accept="image/*" style="display:none;" onchange="uploadCover()">
        <button type="button" onclick="document.getElementById('coverFileInput').click()" style="padding:10px 14px;border-radius:8px;background:transparent;border:1px dashed #555;color:var(--dim);cursor:pointer;font-size:13px;white-space:nowrap;flex-shrink:0;" title="上传封面图">📷</button>
      </div>
    </div>
    <textarea id="excerpt" rows="2" placeholder="摘要"></textarea>
    <textarea id="content" rows="14" placeholder="正文 (Markdown) *"></textarea>
    <div class="preview" id="preview"></div>
    <div style="margin:12px 0; display:flex; gap:12px; align-items:center;">
      <button id="btnSave" onclick="saveArticle()">发布</button>
      <button class="cancel" id="btnCancel" onclick="cancelEdit()" style="display:none;">取消编辑</button>
      <label style="color:var(--dim);font-size:13px;cursor:pointer;">
        <input type="checkbox" id="published" checked> 发布（公开可见）
      </label>
      <label style="color:var(--dim);font-size:13px;cursor:pointer;margin-left:12px;">
        <input type="checkbox" id="recommended"> ⭐ 推荐
      </label>
      <label style="color:var(--dim);font-size:13px;cursor:pointer;margin-left:12px;">
        <input type="checkbox" id="spoiler"> ⚠ 剧透
      </label>
    </div>

    <hr style="border-color:#222; margin:24px 0;">
    <h3>已有文章</h3>
    <div id="articleList"></div>
  </div>

  <div class="toast" id="toast"></div>
</body>
</html>
