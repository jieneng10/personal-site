<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章管理 — jieneng</title>
  <script src="js/supabase-sdk.js"></script>
  <script src="js/marked.min.js"></script>
  <style>
    :root { --bg: #1a1a2e; --card: #16213e; --accent: #7c3aed; --text: #eee; --dim: #888; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Microsoft YaHei', sans-serif; max-width: 900px; margin: 0 auto; padding: 24px 16px;
           background: var(--bg); color: var(--text); min-height: 100vh; }
    h1 { margin-bottom: 8px; }
    .logout { float: right; padding: 8px 16px; border-radius: 8px; background: transparent;
              border: 1px solid #555; color: var(--dim); cursor: pointer; }
    .logout:hover { color: #ff6060; border-color: #ff6060; }
    input, textarea, select { width: 100%; padding: 10px 12px; margin: 6px 0 12px; border-radius: 8px;
      background: var(--card); color: var(--text); border: 1px solid #333; font-size: 14px; }
    input:focus, textarea:focus { border-color: var(--accent); outline: none; }
    textarea { resize: vertical; font-family: monospace; }
    button { padding: 10px 24px; border-radius: 8px; background: var(--accent); color: #fff;
             border: none; cursor: pointer; font-size: 14px; transition: opacity 0.2s; }
    button:hover { opacity: 0.85; }
    button.cancel { background: transparent; border: 1px solid #555; color: var(--dim); }
    button.danger { background: transparent; border: 1px solid #5a2020; color: #ff6060; }
    button.danger:hover { background: rgba(255,60,60,0.1); }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    .article-item { display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: var(--card); border-radius: 8px; margin-bottom: 8px;
      border: 1px solid transparent; transition: border-color 0.2s; }
    .article-item:hover { border-color: #333; }
    .article-item .title { font-weight: bold; }
    .article-item .meta { color: var(--dim); font-size: 13px; }
    .article-item .actions { display: flex; gap: 8px; flex-shrink: 0; }
    .article-item .actions button { padding: 6px 14px; font-size: 13px; border-radius: 6px; }
    .empty { text-align: center; color: var(--dim); padding: 60px 0; }
    .preview { background: var(--card); border: 1px solid #333; border-radius: 8px;
               padding: 16px; margin: 6px 0 12px; min-height: 60px; line-height: 1.7; }
    .preview h1,.preview h2,.preview h3 { margin: 12px 0 6px; color: #c4b5fd; }
    .preview p { margin: 6px 0; }
    .preview code { background: #2d2d3f; padding: 2px 6px; border-radius: 4px; }
    .preview pre { background: #2d2d3f; padding: 12px; border-radius: 8px; overflow-x: auto; }
    .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
             padding: 10px 24px; border-radius: 20px; background: var(--accent); color: #fff;
             font-size: 14px; z-index: 99; display: none; }
  </style>
</head>
<body>
  <button class="logout" onclick="logout()">登出</button>
  <h1>📝 文章管理</h1>
  <p style="color:var(--dim);margin-bottom:20px;">发布、编辑和管理你的文章</p>

  <div id="loginBox">
    <input type="email" id="email" placeholder="邮箱" style="max-width:400px;">
    <input type="password" id="password" placeholder="密码" style="max-width:400px;">
    <div style="display:flex; gap:10px; max-width:400px;">
      <button onclick="login()">登录</button>
      <button class="cancel" onclick="location.href='index.html'">取消</button>
    </div>
  </div>

  <div id="editor" style="display:none;">
    <h3 id="editorTitle">新建文章</h3>
    <div class="row">
      <input type="text" id="title" placeholder="标题 *">
      <input type="text" id="slug" placeholder="slug (URL标识符，留空自动生成)">
    </div>
    <input type="text" id="tags" placeholder="标签 (逗号分隔)">
    <div class="row">
      <input type="text" id="url" placeholder="外链 URL（可选，如 https://...）">
      <input type="text" id="cover" placeholder="封面图 URL（可选）">
    </div>
    <textarea id="excerpt" rows="2" placeholder="摘要"></textarea>
    <textarea id="content" rows="14" placeholder="正文 (Markdown) *"></textarea>
    <div class="preview" id="preview"></div>
    <div style="margin:12px 0; display:flex; gap:12px; align-items:center;">
      <button id="btnSave" onclick="saveArticle()">发布</button>
      <button class="cancel" id="btnCancel" onclick="cancelEdit()" style="display:none;">取消编辑</button>
      <label style="color:var(--dim);font-size:13px;cursor:pointer;">
        <input type="checkbox" id="published" checked> 发布（公开可见）
      </label>
      <label style="color:var(--dim);font-size:13px;cursor:pointer;margin-left:12px;">
        <input type="checkbox" id="recommended"> ⭐ 推荐
      </label>
      <label style="color:var(--dim);font-size:13px;cursor:pointer;margin-left:12px;">
        <input type="checkbox" id="spoiler"> ⚠ 剧透
      </label>
    </div>

    <hr style="border-color:#222; margin:24px 0;">
    <h3>已有文章</h3>
    <div id="articleList"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // 替换为你的 Supabase 项目信息
    var SUPABASE_URL = 'https://nskircwzcsmbkispshif.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5za2lyY3d6Y3NtYmtpc3BzaGlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMDY0MzYsImV4cCI6MjA5NDY4MjQzNn0.jZESXIc71IAVcCEY7nLGJvpPF2XIvm-hyb6-DOKfiE0';
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    var editingId = null;

    function toast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg; el.style.display = '';
      clearTimeout(el._t); el._t = setTimeout(function() { el.style.display = 'none'; }, 2000);
    }

    async function login() {
      var result = await sb.auth.signInWithPassword({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      });
      if (result.error) return toast('登录失败: ' + result.error.message);
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('editor').style.display = 'block';

      // 检查是否为 admin
      var userResult = await sb.auth.getUser();
      var adminResult = await sb.from('admins').select('user_id').eq('user_id', userResult.data.user.id).single();
      if (!adminResult.data) {
        toast('你不是管理员！请在 Supabase SQL Editor 中执行: INSERT INTO admins VALUES (\'' + userResult.data.user.id + '\');');
        await sb.auth.signOut();
        document.getElementById('loginBox').style.display = '';
        document.getElementById('editor').style.display = 'none';
        return;
      }
      loadArticles();
    }

    async function logout() { await sb.auth.signOut(); location.reload(); }

    async function loadArticles() {
      var result = await sb.from('articles').select('*').order('created_at', { ascending: false });
      var list = document.getElementById('articleList');
      var data = result.data || [];
      if (!data.length) {
        list.innerHTML = '<div class="empty">还没有文章，写一篇吧 ✦</div>';
        return;
      }
      list.innerHTML = data.map(function(a) {
        var badges = [];
        if (!a.published) badges.push('<span style="color:#ff6060;">[待审核]</span>');
        if (a.recommended) badges.push('<span style="color:#f0c040;">⭐推荐</span>');
        if (a.url) badges.push('<span style="color:#70c0ff;">🔗外链</span>');
        return '<div class="article-item">' +
          '<div>' +
            '<div class="title">' + a.title + ' ' + badges.join(' ') + '</div>' +
            '<div class="meta">' + (a.created_at || '').slice(0, 10) + ' · ' + (a.tags || []).join(', ') + '</div>' +
          '</div>' +
          '<div class="actions">' +
            (!a.published ? '<button onclick="publishArticle(' + a.id + ')" style="background:#7c3aed;color:#fff;border:none;">发布</button>' : '') +
            '<button onclick="editArticle(' + a.id + ')" style="background:transparent;border:1px solid #555;color:var(--dim);">编辑</button>' +
            '<button class="danger" onclick="deleteArticle(' + a.id + ')">删除</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function editArticle(id) {
      sb.from('articles').select('*').eq('id', id).single().then(function(result) {
        var data = result.data;
        if (!data) return;
        document.getElementById('editorTitle').textContent = '编辑文章';
        document.getElementById('title').value = data.title;
        document.getElementById('slug').value = data.slug || '';
        document.getElementById('tags').value = (data.tags || []).join(', ');
        document.getElementById('url').value = data.url || '';
        document.getElementById('cover').value = data.cover || '';
        document.getElementById('excerpt').value = data.excerpt || '';
        document.getElementById('content').value = data.content || '';
        document.getElementById('published').checked = data.published;
        document.getElementById('recommended').checked = data.recommended || false;
        document.getElementById('spoiler').checked = data.spoiler || false;
        document.getElementById('btnSave').textContent = '保存修改';
        document.getElementById('btnCancel').style.display = '';
        editingId = data.id;
        renderPreview();
      });
    }

    function cancelEdit() {
      editingId = null;
      document.getElementById('editorTitle').textContent = '新建文章';
      document.getElementById('title').value = '';
      document.getElementById('slug').value = '';
      document.getElementById('tags').value = '';
      document.getElementById('url').value = '';
      document.getElementById('cover').value = '';
      document.getElementById('excerpt').value = '';
      document.getElementById('content').value = '';
      document.getElementById('published').checked = true;
      document.getElementById('recommended').checked = false;
      document.getElementById('spoiler').checked = false;
      document.getElementById('btnSave').textContent = '发布';
      document.getElementById('btnCancel').style.display = 'none';
      document.getElementById('preview').innerHTML = '';
    }

    async function saveArticle() {
      var title = document.getElementById('title').value.trim();
      var content = document.getElementById('content').value.trim();
      if (!title) return toast('标题不能为空');
      if (!content) return toast('正文不能为空');

      var tags = document.getElementById('tags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
      var slug = document.getElementById('slug').value.trim()
        || title.toLowerCase().replace(/\s+/g, '-').replace(/[^\w一-鿿-]/g, '').slice(0, 50);
      var published = document.getElementById('published').checked;

      var payload = {
        title: title, slug: slug,
        url: document.getElementById('url').value.trim() || null,
        cover: document.getElementById('cover').value.trim() || null,
        excerpt: document.getElementById('excerpt').value.trim(),
        content: content, tags: tags,
        published: published,
        recommended: document.getElementById('recommended').checked,
        spoiler: document.getElementById('spoiler').checked,
        updated_at: new Date(),
      };

      if (editingId) {
        var updateResult = await sb.from('articles').update(payload).eq('id', editingId);
        if (updateResult.error) return toast('保存失败: ' + updateResult.error.message);
        toast('文章已更新！');
      } else {
        var insertResult = await sb.from('articles').insert(payload);
        if (insertResult.error) return toast('发布失败: ' + insertResult.error.message);
        toast('发布成功！');
      }
      cancelEdit();
      loadArticles();
    }

    async function deleteArticle(id) {
      if (!confirm('确定删除这篇文章？')) return;
      var result = await sb.from('articles').delete().eq('id', id);
      if (result.error) return toast('删除失败');
      toast('已删除');
      loadArticles();
    }

    async function publishArticle(id) {
      var result = await sb.from('articles').update({ published: true, updated_at: new Date() }).eq('id', id);
      if (result.error) return toast('发布失败: ' + result.error.message);
      toast('已发布！');
      loadArticles();
    }

    // Markdown 预览
    document.getElementById('content').addEventListener('input', renderPreview);
    function renderPreview() {
      var md = document.getElementById('content').value;
      document.getElementById('preview').innerHTML = md
        ? marked.parse(md)
        : '<span style="color:var(--dim);">预览区域...</span>';
    }

    // 回车登录
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });

    // 检查已有 session
    (async function() {
      var sessionResult = await sb.auth.getSession();
      if (sessionResult.data.session) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('editor').style.display = 'block';
        loadArticles();
      }
    })();
  </script>
</body>
</html>
