<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — jieneng</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: #0f0a1e; color: #f0e6ff; height: 100vh;
    display: flex; align-items: center; justify-content: center; }
  .card { text-align: center; padding: 48px 32px; border-radius: 24px;
    background: rgba(30,25,50,0.85); border: 1px solid rgba(180,140,220,0.25);
    backdrop-filter: blur(12px); max-width: 400px; width: 88%; }
  .code { font-size: 72px; font-weight: bold;
    background: linear-gradient(180deg, #d4a0ff, #ff90b0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px; }
  .msg { font-size: 16px; color: #b8a0d0; margin-bottom: 28px; }
  .btn { display: inline-block; padding: 10px 36px; border-radius: 22px;
    text-decoration: none; font-size: 14px; letter-spacing: 2px;
    color: #fff; background: linear-gradient(135deg, #d4a0ff, #9060d0);
    transition: opacity 0.25s; }
  .btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <div class="msg">这个页面不存在，或是被移走了 ✦</div>
  <a class="btn" href="/personal-site/">返回首页</a>
</div>
</body>
</html>
