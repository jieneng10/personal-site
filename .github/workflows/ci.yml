name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then echo "缺少 dist/index.html"; exit 1; fi
          if [ ! -f dist/js/bundle.min.js ]; then echo "缺少 dist/js/bundle.min.js"; exit 1; fi
          if [ ! -f dist/sw.js ]; then echo "缺少 dist/sw.js"; exit 1; fi
          echo "构建产物完整 ✓"

  e2e:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: python3 -m http.server 8000 &
        working-directory: ${{ github.workspace }}

      - name: Wait for server
        run: npx wait-on http://localhost:8000/index.html -t 15000

      - name: E2E smoke tests
        run: npx playwright test --config=test/e2e/playwright.config.js
