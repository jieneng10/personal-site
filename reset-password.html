<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重置密码 — jieneng</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: #0f0a1e; color: #f0e6ff; height: 100vh;
    display: flex; align-items: center; justify-content: center; }
  .card { text-align: center; padding: 40px 28px; border-radius: 24px;
    background: rgba(30,25,50,0.92); border: 1px solid rgba(180,140,220,0.3);
    backdrop-filter: blur(12px); max-width: 380px; width: 90%; }
  h2 { color: #d4a0ff; margin-bottom: 8px; letter-spacing: 2px; }
  p { color: #b8a0d0; font-size: 13px; margin-bottom: 20px; }
  input { width: 100%; padding: 12px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
    color: #f0e6ff; font-size: 14px; outline: none; text-align: center;
    margin-bottom: 12px; transition: border-color 0.25s; }
  input:focus { border-color: #d4a0ff; }
  button { width: 100%; padding: 12px 0; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #d4a0ff, #9060d0); color: #fff;
    font-size: 15px; cursor: pointer; letter-spacing: 1px;
    transition: opacity 0.25s; margin-bottom: 12px; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { font-size: 13px; min-height: 20px; margin-top: 8px; }
  .msg.success { color: #70e0a0; }
  .msg.error { color: #ff7070; }
  .back { font-size: 12px; color: #b8a0d0; }
  .back a { color: #d4a0ff; text-decoration: none; }
  .back a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <!-- Step 1: 输入邮箱 -->
  <div id="step1">
    <h2>🔑 重置密码</h2>
    <p>输入注册邮箱，我们会发送重置链接</p>
    <input type="email" id="resetEmail" placeholder="输入你的邮箱" autocomplete="email">
    <button id="btnSendReset">发送重置邮件</button>
    <div class="msg" id="msg1"></div>
    <div class="back"><a href="index.html">← 返回首页</a></div>
  </div>

  <!-- Step 2: 设置新密码（邮件链接回调） -->
  <div id="step2" style="display:none;">
    <h2>🔐 设置新密码</h2>
    <p>输入你的新密码（至少 6 位）</p>
    <input type="password" id="newPassword" placeholder="新密码（至少6位）" autocomplete="new-password">
    <input type="password" id="newPasswordConfirm" placeholder="确认新密码" autocomplete="new-password">
    <button id="btnUpdatePassword">更新密码</button>
    <div class="msg" id="msg2"></div>
    <div class="back"><a href="index.html">← 返回首页</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/shared.js"></script>
<script src="js/supabase.js"></script>
<script>
(function() {
  var sb = window.sb;

  // ========== 检测是否从重置邮件链接而来 ==========
  // Supabase 重置邮件会带 type=recovery 参数，hash 中有 access_token
  if (window.location.hash && window.location.hash.includes('type=recovery')) {
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = '';
  }

  // ========== Step 1: 发送重置邮件 ==========
  document.getElementById('btnSendReset').addEventListener('click', async function() {
    var email = document.getElementById('resetEmail').value.trim();
    var msg = document.getElementById('msg1');

    if (!email) {
      msg.textContent = '请输入邮箱地址';
      msg.className = 'msg error';
      return;
    }

    var btn = document.getElementById('btnSendReset');
    btn.disabled = true;
    btn.textContent = '发送中...';
    msg.textContent = '';
    msg.className = 'msg';

    try {
      // redirectTo 指向当前页面，让用户回到这里设置新密码
      var result = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname,
      });

      if (result.error) {
        msg.textContent = '发送失败: ' + result.error.message;
        msg.className = 'msg error';
      } else {
        msg.textContent = '✓ 重置邮件已发送！请检查收件箱（和垃圾邮件箱）';
        msg.className = 'msg success';
      }
    } catch (e) {
      msg.textContent = '网络错误，请稍后重试';
      msg.className = 'msg error';
    } finally {
      btn.disabled = false;
      btn.textContent = '发送重置邮件';
    }
  });

  // ========== Step 2: 更新密码 ==========
  document.getElementById('btnUpdatePassword').addEventListener('click', async function() {
    var pwd = document.getElementById('newPassword').value;
    var pwd2 = document.getElementById('newPasswordConfirm').value;
    var msg = document.getElementById('msg2');

    if (!pwd || pwd.length < 6) {
      msg.textContent = '密码至少 6 位';
      msg.className = 'msg error';
      return;
    }
    if (pwd !== pwd2) {
      msg.textContent = '两次输入的密码不一致';
      msg.className = 'msg error';
      return;
    }

    var btn = document.getElementById('btnUpdatePassword');
    btn.disabled = true;
    btn.textContent = '更新中...';
    msg.textContent = '';
    msg.className = 'msg';

    try {
      var result = await sb.auth.updateUser({ password: pwd });
      if (result.error) {
        msg.textContent = '更新失败: ' + result.error.message;
        msg.className = 'msg error';
      } else {
        msg.textContent = '✓ 密码已更新！3 秒后跳转到首页...';
        msg.className = 'msg success';
        setTimeout(function() { window.location.href = 'index.html'; }, 3000);
      }
    } catch (e) {
      msg.textContent = '网络错误，请稍后重试';
      msg.className = 'msg error';
    } finally {
      btn.disabled = false;
      btn.textContent = '更新密码';
    }
  });
})();
</script>
</body>
</html>
